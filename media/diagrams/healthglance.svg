<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title-hlth2 desc-hlth2">
  <title id="title-hlth2">Native Lane Architecture: Operations &amp; Commit Semantics</title>
  <desc id="desc-hlth2">Detailed temporal operations, constraints, and strict commit semantics of the independent native lanes.</desc>
  <defs>
    <!-- Backgrounds -->
    <linearGradient id="bg-hlth2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    
    <!-- Swimlane Backgrounds -->
    <linearGradient id="hotBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2A0B0B"/>
      <stop offset="100%" stop-color="#140505"/>
    </linearGradient>
    <linearGradient id="coldBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#061E2E"/>
      <stop offset="100%" stop-color="#030F17"/>
    </linearGradient>
    <linearGradient id="changeBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#180B2E"/>
      <stop offset="100%" stop-color="#0C0517"/>
    </linearGradient>

    <!-- Markers -->
    <marker id="arrow-hot" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L10,5 L0,9 Z" fill="#EF4444"/>
    </marker>
    <marker id="arrow-cold" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L10,5 L0,9 Z" fill="#0EA5E9"/>
    </marker>
    <marker id="arrow-change" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L10,5 L0,9 Z" fill="#A855F7"/>
    </marker>
    <marker id="arrow-preempt" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L10,5 L0,9 Z" fill="#F87171"/>
    </marker>
    
    <filter id="shadow-hlth2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <style>
      .title { font: 700 32px Inter, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 400 16px Inter, sans-serif; fill: #94A3B8; }
      .laneTitle { font: 800 24px Inter, sans-serif; }
      .metaLabel { font: 700 14px Inter, sans-serif; fill: #94A3B8; }
      .metaValue { font: 400 14px Inter, sans-serif; fill: #E2E8F0; }
      .timelineText { font: 600 14px "JetBrains Mono", monospace; }
      .descText { font: 600 14px Inter, sans-serif; }
      .subText { font: 400 13px Inter, sans-serif; fill: #CBD5E1; }
      .cursorPill { font: 700 13px "JetBrains Mono", monospace; fill: #FFFFFF; }
      .badge { font: 700 12px Inter, sans-serif; text-transform: uppercase; fill: #FFFFFF; letter-spacing: 0.05em; }
    </style>
  </defs>

  <!-- Base -->
  <rect width="1600" height="1100" rx="24" fill="url(#bg-hlth2)"/>
  <rect x="24" y="24" width="1552" height="1052" rx="20" fill="none" stroke="#334155" stroke-width="2"/>

  <!-- Header -->
  <text x="56" y="76" class="title">Native Lane Architecture: Operations &amp; Commit Semantics</text>
  <text x="56" y="104" class="subtitle">Independent temporal execution lanes, each enforcing specific progress invariants and atomic commits.</text>

  <!-- Legend -->
  <rect x="1220" y="40" width="340" height="80" rx="8" fill="#1E293B" stroke="#475569"/>
  <text x="1235" y="65" class="metaLabel" fill="#F8FAFC">Visual Legend</text>
  <path d="M 1235,85 L 1265,85" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arrow-hot)"/>
  <text x="1275" y="89" class="metaValue">Direction of Time / Progress</text>
  <path d="M 1450,85 L 1480,85" stroke="#F87171" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow-preempt)"/>
  <text x="1490" y="89" class="metaValue">Preemption</text>

  <!-- ========================================================= -->
  <!-- SWIMLANE 1: HOT (FRESHNESS)                               -->
  <!-- ========================================================= -->
  <g filter="url(#shadow-hlth2)">
    <rect x="40" y="140" width="1520" height="320" rx="16" fill="url(#hotBg)" stroke="#7F1D1D" stroke-width="2"/>
    <rect x="40" y="140" width="12" height="320" rx="6" fill="#EF4444"/>
  </g>
  
  <text x="70" y="180" class="laneTitle" fill="#FCA5A5">HOT LANE: Freshness &amp; Resumable Catchup</text>
  <text x="70" y="205" class="subText" fill="#94A3B8" font-size="14">Ensures immediate recent UX paint while rigorously protecting against skipped data in historical gaps.</text>

  <!-- HOT Meta Box (Firmly on the Left) -->
  <rect x="70" y="230" width="400" height="160" rx="8" fill="#000000" fill-opacity="0.3" stroke="#450A0A"/>
  <text x="85" y="255" class="metaLabel">Trigger:</text><text x="170" y="255" class="metaValue">Foreground JS orchestration demand</text>
  <text x="85" y="280" class="metaLabel">Query:</text><text x="170" y="280" class="metaValue">Recent sample query (.userInitiated)</text>
  <text x="85" y="305" class="metaLabel">Direction:</text><text x="170" y="305" class="metaValue">Descending (Paint) then Ascending (Catchup)</text>
  <text x="85" y="330" class="metaLabel">Cursor:</text>
  <rect x="170" y="316" width="100" height="20" rx="10" fill="#7F1D1D" stroke="#EF4444"/><text x="220" y="330" text-anchor="middle" class="cursorPill">hot_anchor</text>
  <text x="85" y="355" class="metaLabel">Failure:</text><text x="170" y="355" class="metaValue">Watermark securely locks to last covered chunk</text>

  <!-- HOT Temporal Graphic (Shifted Safely to the Right) -->
  <!-- Timeline Base -->
  <path d="M 600 360 L 1480 360" stroke="#450A0A" stroke-width="4"/>
  
  <line x1="640" y1="345" x2="640" y2="375" stroke="#94A3B8" stroke-width="2"/>
  <text x="640" y="395" text-anchor="middle" class="timelineText" fill="#94A3B8">gapStart (hot_anchor)</text>
  
  <line x1="1100" y1="345" x2="1100" y2="375" stroke="#94A3B8" stroke-width="2"/>
  <text x="1100" y="395" text-anchor="middle" class="timelineText" fill="#94A3B8">gapEnd</text>

  <line x1="1450" y1="345" x2="1450" y2="375" stroke="#EF4444" stroke-width="2"/>
  <text x="1450" y="395" text-anchor="middle" class="timelineText" fill="#EF4444">Now</text>

  <!-- Visual Zone: Pass A -->
  <rect x="1110" y="260" width="330" height="60" rx="8" fill="#450A0A" stroke="#B91C1C" stroke-dasharray="4 4"/>
  <path d="M 1430 290 L 1150 290" fill="none" stroke="#FCA5A5" stroke-width="3" stroke-dasharray="4 4" marker-end="url(#arrow-hot)"/>
  <rect x="1200" y="240" width="150" height="26" rx="4" fill="#7F1D1D"/>
  <text x="1275" y="258" text-anchor="middle" class="descText" fill="#FFFFFF">Pass A: First Paint</text>
  <text x="1275" y="308" text-anchor="middle" class="subText" fill="#FCA5A5">Insert ONLY. Cursor locked.</text>

  <!-- Visual Zone: Pass B -->
  <rect x="650" y="260" width="440" height="60" rx="8" fill="#7F1D1D" stroke="#EF4444"/>
  <path d="M 670 290 L 780 290" fill="none" stroke="#EF4444" stroke-width="3" marker-end="url(#arrow-hot)"/>
  <path d="M 810 290 L 920 290" fill="none" stroke="#EF4444" stroke-width="3" marker-end="url(#arrow-hot)"/>
  <path d="M 950 290 L 1060 290" fill="none" stroke="#EF4444" stroke-width="3" marker-end="url(#arrow-hot)"/>
  <rect x="780" y="240" width="180" height="26" rx="4" fill="#991B1B"/>
  <text x="870" y="258" text-anchor="middle" class="descText" fill="#FFFFFF">Pass B: Gap Catch-up</text>
  <text x="870" y="308" text-anchor="middle" class="subText" fill="#FECACA">Atomic insert + hot_anchor advances per chunk</text>

  <!-- Hard Stop Constraint Marker (Text cleanly wrapped in widened box) -->
  <line x1="1050" y1="340" x2="1050" y2="430" stroke="#F87171" stroke-width="2" stroke-dasharray="4 4"/>
  <rect x="870" y="415" width="360" height="26" rx="4" fill="#450A0A" stroke="#F87171"/>
  <text x="1050" y="433" text-anchor="middle" class="descText" fill="#FCA5A5" font-size="13">Watermark advances ONLY to covered boundary</text>


  <!-- ========================================================= -->
  <!-- PREEMPTION ARROW                                          -->
  <!-- ========================================================= -->
  <path d="M 230 460 L 230 500" stroke="#F87171" stroke-width="3" stroke-dasharray="6 6" marker-end="url(#arrow-preempt)"/>
  <rect x="180" y="470" width="100" height="24" rx="4" fill="#450A0A" stroke="#F87171"/>
  <text x="230" y="487" text-anchor="middle" class="badge" fill="#FCA5A5">HOT Preempts</text>


  <!-- ========================================================= -->
  <!-- SWIMLANE 2: COLD (HISTORICAL BACKFILL)                    -->
  <!-- ========================================================= -->
  <g filter="url(#shadow-hlth2)">
    <rect x="40" y="510" width="1520" height="260" rx="16" fill="url(#coldBg)" stroke="#0284C7" stroke-width="2"/>
    <rect x="40" y="510" width="12" height="260" rx="6" fill="#0EA5E9"/>
  </g>
  
  <text x="70" y="550" class="laneTitle" fill="#7DD3FC">COLD LANE: Historical Context &amp; Profiling</text>
  <text x="70" y="575" class="subText" fill="#94A3B8" font-size="14">Strictly backward-walking historical baseline sweep from a fixed point. Resumable within partial chunks.</text>

  <!-- COLD Meta Box -->
  <rect x="70" y="595" width="400" height="150" rx="8" fill="#000000" fill-opacity="0.3" stroke="#082F49"/>
  <text x="85" y="620" class="metaLabel">Trigger:</text><text x="170" y="620" class="metaValue">Background/idle fill orchestration</text>
  <text x="85" y="645" class="metaLabel">Query:</text><text x="170" y="645" class="metaValue">Chunked historical query (.utility)</text>
  <text x="85" y="670" class="metaLabel">Direction:</text><text x="170" y="670" class="metaValue">Backward through history (Leftward)</text>
  <text x="85" y="695" class="metaLabel">Cursor:</text>
  <rect x="170" y="681" width="100" height="20" rx="10" fill="#0C4A6E" stroke="#0EA5E9"/><text x="220" y="695" text-anchor="middle" class="cursorPill">cold_time</text>
  <text x="85" y="720" class="metaLabel">Resumes:</text><text x="170" y="720" class="metaValue">Advances on empty; internal intra-window index</text>

  <!-- COLD Temporal Graphic -->
  <path d="M 520 670 L 1480 670" stroke="#082F49" stroke-width="4"/>
  
  <line x1="560" y1="650" x2="560" y2="690" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="560" y="710" text-anchor="middle" class="timelineText" fill="#0EA5E9">Historical Boundary</text>
  
  <line x1="1400" y1="650" x2="1400" y2="690" stroke="#7DD3FC" stroke-width="3"/>
  <text x="1400" y="710" text-anchor="middle" class="timelineText" fill="#7DD3FC">Reference Now (Fixed)</text>

  <!-- Rigid Leftward Chunks -->
  <rect x="1200" y="640" width="180" height="60" rx="4" fill="#0C4A6E" stroke="#0284C7" opacity="0.6"/>
  <text x="1290" y="675" text-anchor="middle" class="descText" fill="#BAE6FD">Chunk 1 (Done)</text>

  <rect x="980" y="640" width="180" height="60" rx="4" fill="#0369A1" stroke="#38BDF8"/>
  <text x="1070" y="665" text-anchor="middle" class="descText" fill="#FFFFFF">Chunk 2 (Active)</text>
  
  <rect x="760" y="640" width="180" height="60" rx="4" fill="#082F49" stroke="#0284C7" stroke-dasharray="4 4" opacity="0.4"/>
  <text x="850" y="675" text-anchor="middle" class="descText" fill="#7DD3FC">Chunk 3 (Next)</text>

  <!-- Arrows demonstrating strict movement -->
  <path d="M 1190 670 L 1170 670" fill="none" stroke="#38BDF8" stroke-width="3" marker-end="url(#arrow-cold)"/>
  <path d="M 970 670 L 950 670" fill="none" stroke="#38BDF8" stroke-width="3" marker-end="url(#arrow-cold)"/>

  <!-- Intra-window resume callout (Text cleanly wrapped in widened box) -->
  <rect x="990" y="675" width="100" height="15" rx="2" fill="#0C4A6E"/>
  <rect x="990" y="675" width="60" height="15" rx="2" fill="#38BDF8"/>
  <path d="M 1050 690 L 1050 720" stroke="#38BDF8" stroke-width="2" stroke-dasharray="2 2"/>
  <rect x="900" y="720" width="300" height="26" rx="4" fill="#0C4A6E" stroke="#38BDF8"/>
  <text x="1050" y="738" text-anchor="middle" class="descText" fill="#E0F2FE" font-size="13">Intra-window resume state tracking</text>


  <!-- ========================================================= -->
  <!-- SWIMLANE 3: CHANGE (DELTA MAINTENANCE)                    -->
  <!-- ========================================================= -->
  <g filter="url(#shadow-hlth2)">
    <rect x="40" y="790" width="1520" height="290" rx="16" fill="url(#changeBg)" stroke="#7E22CE" stroke-width="2"/>
    <rect x="40" y="790" width="12" height="290" rx="6" fill="#A855F7"/>
  </g>

  <text x="70" y="830" class="laneTitle" fill="#D8B4FE">CHANGE LANE: Delta Correctness &amp; Maintenance</text>
  <text x="70" y="855" class="subText" fill="#94A3B8" font-size="14">Foreground/Background loop ensuring local DB aligns with HealthKit edits, additions, and soft-deletions.</text>

  <!-- Background Budget Badge -->
  <rect x="740" y="810" width="260" height="26" rx="13" fill="#581C87" stroke="#A855F7"/>
  <text x="870" y="828" text-anchor="middle" class="badge" fill="#E9D5FF">Observer &amp; Background Capable</text>

  <!-- CHANGE Meta Box -->
  <rect x="70" y="880" width="400" height="160" rx="8" fill="#000000" fill-opacity="0.3" stroke="#3B0764"/>
  <text x="85" y="905" class="metaLabel">Trigger:</text><text x="170" y="905" class="metaValue">Observers OR Foreground Maintenance</text>
  <text x="85" y="930" class="metaLabel">Query:</text><text x="170" y="930" class="metaValue">HKAnchoredObjectQuery (.default)</text>
  <text x="85" y="955" class="metaLabel">Direction:</text><text x="170" y="955" class="metaValue">Forward through source changes</text>
  <text x="85" y="980" class="metaLabel">Cursor:</text>
  <rect x="170" y="966" width="125" height="20" rx="10" fill="#4C1D95" stroke="#A855F7"/><text x="232" y="980" text-anchor="middle" class="cursorPill">change_anchor</text>
  <text x="85" y="1005" class="metaLabel">Semantics:</text><text x="170" y="1005" class="metaValue">Strict gate: Commit first, then advance</text>

  <!-- CHANGE Temporal Graphic (Linear Loop with Hard Gate) -->
  
  <rect x="520" y="930" width="180" height="40" rx="20" fill="#3B0764" stroke="#A855F7"/>
  <text x="610" y="955" text-anchor="middle" class="timelineText" fill="#FFFFFF">HKAnchored Query</text>
  
  <path d="M 700 950 L 740 950" stroke="#A855F7" stroke-width="3" marker-end="url(#arrow-change)"/>
  
  <!-- Delta Split -->
  <rect x="750" y="910" width="80" height="80" rx="8" fill="#1E1B4B" stroke="#6D28D9" transform="rotate(45 790 950)"/>
  <text x="790" y="955" text-anchor="middle" class="descText" fill="#D8B4FE">Delta</text>

  <!-- Deletions -->
  <path d="M 830 900 C 850 880, 870 880, 900 880" fill="none" stroke="#A855F7" stroke-width="2" marker-end="url(#arrow-change)"/>
  <rect x="910" y="860" width="240" height="40" rx="8" fill="#581C87" stroke="#A855F7"/>
  <text x="1030" y="885" text-anchor="middle" class="descText" fill="#E9D5FF">Soft-delete + Enqueue</text>

  <!-- Additions -->
  <path d="M 830 1000 C 850 1020, 870 1020, 900 1020" fill="none" stroke="#A855F7" stroke-width="2" marker-end="url(#arrow-change)"/>
  <rect x="910" y="1000" width="240" height="40" rx="8" fill="#4C1D95" stroke="#A855F7"/>
  <text x="1030" y="1025" text-anchor="middle" class="descText" fill="#E9D5FF">Normalize + Upsert</text>

  <!-- Convergence to Strict Gate -->
  <path d="M 1150 880 C 1180 880, 1200 900, 1220 930" fill="none" stroke="#A855F7" stroke-width="2" marker-end="url(#arrow-change)"/>
  <path d="M 1150 1020 C 1180 1020, 1200 1000, 1220 970" fill="none" stroke="#A855F7" stroke-width="2" marker-end="url(#arrow-change)"/>

  <!-- Atomic Local Commit Gate -->
  <rect x="1230" y="910" width="160" height="80" rx="8" fill="#064E3B" stroke="#10B981" stroke-width="3"/>
  <text x="1310" y="950" text-anchor="middle" class="descText" fill="#34D399" font-size="16">ATOMIC COMMIT</text>
  <text x="1310" y="970" text-anchor="middle" class="subText" fill="#A7F3D0">Local mutations</text>

  <!-- Advance Anchor (Must be after commit) -->
  <path d="M 1390" y="950 L 1430 950" stroke="#10B981" stroke-width="3" marker-end="url(#arrow-change)"/>
  <rect x="1440" y="930" width="140" height="40" rx="20" fill="#2E1065" stroke="#D8B4FE"/>
  <text x="1510" y="955" text-anchor="middle" class="descText" fill="#FFFFFF" font-size="12">Advance Anchor</text>

  <!-- Loop back -->
  <path d="M 1510 930 C 1510 840, 1200 840, 1100 840 C 800 840, 610 870, 610 920" fill="none" stroke="#6D28D9" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow-change)"/>
  <rect x="1250" y="825" width="120" height="24" rx="12" fill="#0C0517" stroke="#6D28D9"/>
  <text x="1310" y="842" text-anchor="middle" class="subText" fill="#D8B4FE">Loop securely</text>

</svg>
