<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Offline Sync Pull / Apply / Integrity Path</title>
  <desc id="desc">Accurate pull lifecycle: composite fetch, nested ApplyEngine, true SyncBatchContext mappings, and deferred atomic cursor commit via Coordinator.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,1 L12,7 L0,13 Z" fill="#94A3B8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <style>
      .title { font: 700 28px Inter, -apple-system, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 400 15px Inter, -apple-system, sans-serif; fill: #94A3B8; }
      .colHeader { font: 700 18px Inter, -apple-system, sans-serif; fill: #E2E8F0; }
      .cardTitle { font: 700 14px Inter, -apple-system, sans-serif; fill: #F8FAFC; }
      .cardMeta { font: 400 12px Inter, -apple-system, sans-serif; fill: #CBD5E1; }
      .diamondText { font: 600 13px Inter, -apple-system, sans-serif; fill: #F8FAFC; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1600" height="1100" rx="24" fill="url(#bg)"/>
  <rect x="32" y="32" width="1536" height="1036" rx="20" fill="none" stroke="#1E293B"/>

  <text x="64" y="80" class="title">Offline Sync Pull / Apply / Integrity Path</text>
  <text x="64" y="106" class="subtitle">Accurate flow: Incremental fetch, nested ApplyEngine, correctly mapped SyncBatchContext, and integrity-gated cursor commit.</text>

  <!-- Columns -->
  <rect x="64" y="150" width="280" height="880" rx="16" fill="rgba(30, 41, 59, 0.4)" stroke="#334155"/>
  <text x="84" y="186" class="colHeader">1. Pull State / Entry</text>

  <rect x="364" y="150" width="480" height="880" rx="16" fill="rgba(30, 58, 138, 0.15)" stroke="#1D4ED8"/>
  <text x="384" y="186" class="colHeader">2. PullEngine &amp; Apply Phase</text>
  
  <rect x="864" y="150" width="300" height="880" rx="16" fill="rgba(76, 29, 149, 0.15)" stroke="#7C3AED"/>
  <text x="884" y="186" class="colHeader">3. Per-Run Context</text>

  <rect x="1184" y="150" width="340" height="880" rx="16" fill="rgba(17, 94, 89, 0.15)" stroke="#0F766E"/>
  <text x="1204" y="186" class="colHeader">4. Validate &amp; Commit</text>

  <!-- PullEngine Container (Scope) -->
  <rect x="384" y="210" width="440" height="800" rx="16" fill="rgba(15, 23, 42, 0.5)" stroke="#3B82F6" stroke-dasharray="8,4"/>
  <text x="404" y="240" class="colHeader" fill="#93C5FD">PullEngine Execution Scope</text>

  <!-- Flow Lines -->
  <!-- Col 1 Entry Flow -->
  <path d="M 204 290 L 204 330" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 204 410 L 204 450" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 204 530 L 204 550 C 204 570 124 570 124 590 L 124 620" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 204 530 L 204 550 C 204 570 284 570 284 590 L 284 620" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 124 680 L 124 710 C 124 730 464 730 464 330" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 284 680 L 284 710 C 284 730 464 730 464 330" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Col 2 Internal Flow -->
  <path d="M 464 330 L 464 360" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 464 420 L 464 450" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 464 510 L 464 540" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Col 2 to Col 3 (Bold Context Bridging Arrow) -->
  <path d="M 824 540 L 964 540" stroke="#A78BFA" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <!-- Col 3 Internal Decomposition -->
  <path d="M 1014 580 L 1014 620" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1014 680 L 1014 710" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1014 770 L 1014 800" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1014 860 L 1014 890" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Col 3 to Col 4 (Integrity Check) -->
  <path d="M 1164 540 L 1284 540" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Col 4 Internal Flow -->
  <path d="M 1364 580 L 1364 610" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1364 690 L 1364 710 C 1364 730 1264 730 1264 750 L 1264 780" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1364 690 L 1364 710 C 1364 730 1464 730 1464 750 L 1464 780" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1464 840 L 1464 880" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1464 950 L 1464 970 C 1464 990 204 990 204 310" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arrow)"/>


  <!-- Col 1: State / Entry -->
  <g filter="url(#shadow)">
    <rect x="104" y="230" width="200" height="60" rx="12" fill="#0F172A" stroke="#475569"/>
  </g>
  <rect x="114" y="240" width="4" height="40" rx="2" fill="#3B82F6"/>
  <text x="128" y="254" class="cardTitle">CursorRepository</text>
  <text x="128" y="274" class="cardMeta">Fetch per-entity cursors</text>

  <g filter="url(#shadow)">
    <rect x="104" y="330" width="200" height="80" rx="12" fill="#1E293B" stroke="#64748B"/>
  </g>
  <rect x="114" y="340" width="4" height="60" rx="2" fill="#8B5CF6"/>
  <text x="128" y="354" class="cardTitle">Build Composite Cursor</text>
  <text x="128" y="374" class="cardMeta">Combine into one payload</text>
  <text x="128" y="394" class="cardMeta">for unified sync request</text>

  <g filter="url(#shadow)">
    <polygon points="204,450 284,490 204,530 124,490" fill="#1E293B" stroke="#64748B"/>
  </g>
  <text x="204" y="494" class="diamondText">Valid composite?</text>
  <text x="124" y="540" class="cardMeta" fill="#EF4444">No / Corrupt</text>
  <text x="284" y="540" class="cardMeta" fill="#22C55E">Yes</text>

  <g filter="url(#shadow)">
    <rect x="84" y="620" width="120" height="60" rx="12" fill="#450A0A" stroke="#EF4444"/>
  </g>
  <rect x="94" y="630" width="4" height="40" rx="2" fill="#EF4444"/>
  <text x="108" y="644" class="cardTitle">Initial Pull</text>
  <text x="108" y="664" class="cardMeta">Fetch from empty</text>

  <g filter="url(#shadow)">
    <rect x="224" y="620" width="120" height="60" rx="12" fill="#064E3B" stroke="#10B981"/>
  </g>
  <rect x="234" y="630" width="4" height="40" rx="2" fill="#10B981"/>
  <text x="248" y="644" class="cardTitle">Incremental</text>
  <text x="248" y="664" class="cardMeta">Fetch delta changes</text>

  <!-- Col 2: PullEngine Fetch Loop -->
  <g filter="url(#shadow)">
    <rect x="404" y="270" width="180" height="60" rx="12" fill="#1E293B" stroke="#3B82F6"/>
  </g>
  <rect x="414" y="280" width="4" height="40" rx="2" fill="#3B82F6"/>
  <text x="428" y="294" class="cardTitle">Page Loop</text>
  <text x="428" y="314" class="cardMeta">Bounded by iterations</text>

  <g filter="url(#shadow)">
    <rect x="404" y="360" width="180" height="60" rx="12" fill="#0F172A" stroke="#64748B"/>
  </g>
  <rect x="414" y="370" width="4" height="40" rx="2" fill="#10B981"/>
  <text x="428" y="384" class="cardTitle">Backend API Client</text>
  <text x="428" y="404" class="cardMeta">GET /sync/changes</text>

  <g filter="url(#shadow)">
    <rect x="404" y="450" width="180" height="60" rx="12" fill="#1E293B" stroke="#3B82F6"/>
  </g>
  <rect x="414" y="460" width="4" height="40" rx="2" fill="#3B82F6"/>
  <text x="428" y="474" class="cardTitle">Receive Payload</text>
  <text x="428" y="494" class="cardMeta">Entity cursors + changes</text>

  <!-- Nested ApplyEngine -->
  <rect x="404" y="540" width="400" height="450" rx="12" fill="rgba(30, 41, 59, 0.8)" stroke="#8B5CF6"/>
  <text x="424" y="570" class="colHeader" fill="#C4B5FD">ApplyEngine</text>
  <text x="424" y="590" class="cardMeta">Applies payload changes iteratively</text>

  <g filter="url(#shadow)">
    <rect x="424" y="610" width="360" height="60" rx="12" fill="#32131A" stroke="#F97316"/>
  </g>
  <rect x="434" y="620" width="4" height="40" rx="2" fill="#F97316"/>
  <text x="448" y="634" class="cardTitle">Public Product CREATE/UPDATE Skip</text>
  <text x="448" y="654" class="cardMeta">Snapshot authoritative for isPublic=true</text>

  <g filter="url(#shadow)">
    <rect x="424" y="690" width="170" height="60" rx="12" fill="#0F172A" stroke="#64748B"/>
  </g>
  <rect x="434" y="700" width="4" height="40" rx="2" fill="#8B5CF6"/>
  <text x="448" y="714" class="cardTitle">Handler Registry</text>
  <text x="448" y="734" class="cardMeta">Lookup correct handler</text>

  <g filter="url(#shadow)">
    <rect x="614" y="690" width="170" height="60" rx="12" fill="#0F172A" stroke="#64748B"/>
  </g>
  <rect x="624" y="700" width="4" height="40" rx="2" fill="#3B82F6"/>
  <text x="638" y="714" class="cardTitle">Idempotent Fallback</text>
  <text x="638" y="734" class="cardMeta">CREATE on exist=UPDATE</text>

  <g filter="url(#shadow)">
    <rect x="424" y="770" width="360" height="60" rx="12" fill="#0F172A" stroke="#64748B"/>
  </g>
  <rect x="434" y="780" width="4" height="40" rx="2" fill="#A78BFA"/>
  <text x="448" y="794" class="cardTitle">Inbound FK Translation (IdMapRepository)</text>
  <text x="448" y="814" class="cardMeta">Resolve incoming server FKs to local client UUIDs</text>

  <g filter="url(#shadow)">
    <rect x="424" y="850" width="360" height="60" rx="12" fill="#0F172A" stroke="#10B981"/>
  </g>
  <rect x="434" y="860" width="4" height="40" rx="2" fill="#10B981"/>
  <text x="448" y="874" class="cardTitle">Local Entity Repositories</text>
  <text x="448" y="894" class="cardMeta">Mutate local SQLite tables with normalized data</text>

  <!-- Col 3: Per-Run Context -->
  <g filter="url(#shadow)">
    <rect x="884" y="500" width="260" height="80" rx="12" fill="#2E1065" stroke="#8B5CF6"/>
  </g>
  <rect x="894" y="510" width="4" height="60" rx="2" fill="#C4B5FD"/>
  <text x="908" y="534" class="cardTitle">SyncBatchContext</text>
  <text x="908" y="554" class="cardMeta">In-memory bridge for pull results</text>
  <text x="908" y="574" class="cardMeta">Decomposes into:</text>

  <g filter="url(#shadow)">
    <rect x="914" y="620" width="200" height="60" rx="12" fill="#0F172A" stroke="#475569"/>
  </g>
  <rect x="924" y="630" width="4" height="40" rx="2" fill="#3B82F6"/>
  <text x="938" y="644" class="cardTitle">Touched Source IDs</text>
  <text x="938" y="664" class="cardMeta">Rows modified locally</text>

  <g filter="url(#shadow)">
    <rect x="914" y="710" width="200" height="60" rx="12" fill="#0F172A" stroke="#475569"/>
  </g>
  <rect x="924" y="720" width="4" height="40" rx="2" fill="#A78BFA"/>
  <text x="938" y="734" class="cardTitle">Touched Target IDs</text>
  <text x="938" y="754" class="cardMeta">Parent IDs for checks</text>

  <g filter="url(#shadow)">
    <rect x="914" y="800" width="200" height="60" rx="12" fill="#0F172A" stroke="#475569"/>
  </g>
  <rect x="924" y="810" width="4" height="40" rx="2" fill="#EF4444"/>
  <text x="938" y="814" class="cardTitle">Deleted IDs</text>
  <text x="938" y="834" class="cardMeta">Tracked for target-side</text>

  <g filter="url(#shadow)">
    <rect x="914" y="890" width="200" height="60" rx="12" fill="#0F172A" stroke="#475569"/>
  </g>
  <rect x="924" y="900" width="4" height="40" rx="2" fill="#F59E0B"/>
  <text x="938" y="914" class="cardTitle">Deferred Cursors</text>
  <text x="938" y="934" class="cardMeta">Held if no apply failures</text>

  <!-- Col 4: Validate & Commit -->
  <g filter="url(#shadow)">
    <rect x="1244" y="500" width="240" height="80" rx="12" fill="#1E293B" stroke="#F59E0B"/>
  </g>
  <rect x="1254" y="510" width="4" height="60" rx="2" fill="#F59E0B"/>
  <text x="1268" y="524" class="cardTitle">IntegrityGate</text>
  <text x="1268" y="544" class="cardMeta">Uses RELATION_GRAPH &amp; Context</text>
  <text x="1268" y="564" class="cardMeta">Source &amp; Target orphan queries</text>

  <g filter="url(#shadow)">
    <polygon points="1364,610 1444,650 1364,690 1284,650" fill="#1E293B" stroke="#64748B"/>
  </g>
  <text x="1364" y="654" class="diamondText">Passes Checks?</text>

  <g filter="url(#shadow)">
    <rect x="1204" y="780" width="180" height="80" rx="12" fill="#450A0A" stroke="#EF4444"/>
  </g>
  <rect x="1214" y="790" width="4" height="60" rx="2" fill="#EF4444"/>
  <text x="1228" y="804" class="cardTitle">Integrity Failed</text>
  <text x="1228" y="824" class="cardMeta">Withhold cursor commit</text>
  <text x="1228" y="844" class="cardMeta">Surface Integrity Error</text>

  <g filter="url(#shadow)">
    <rect x="1404" y="780" width="160" height="60" rx="12" fill="#115E59" stroke="#10B981"/>
  </g>
  <rect x="1414" y="790" width="4" height="40" rx="2" fill="#10B981"/>
  <text x="1428" y="804" class="cardTitle">Commit Progress</text>
  <text x="1428" y="824" class="cardMeta">SyncCoordinator owner</text>

  <g filter="url(#shadow)">
    <rect x="1404" y="880" width="180" height="70" rx="12" fill="#0F172A" stroke="#475569"/>
  </g>
  <rect x="1414" y="890" width="4" height="50" rx="2" fill="#3B82F6"/>
  <text x="1428" y="904" class="cardTitle">CursorRepository</text>
  <text x="1428" y="924" class="cardMeta">Atomic persistence via</text>
  <text x="1428" y="944" class="cardMeta">setMultipleCursors()</text>

  <!-- Flow Labels -->
  <text x="1280" y="710" class="cardMeta" fill="#EF4444">Violations</text>
  <text x="1410" y="710" class="cardMeta" fill="#22C55E">Clean / Warn Only</text>
  <text x="1480" y="860" class="cardMeta" fill="#F59E0B">Only if Integrity Passes</text>

</svg>
